version: '3'

rpc:
  listen: tcp://127.0.0.1:6207

server:
  command: "php php_test_files/jobs/jobs_ok.php"
  relay: "pipes"
  relay_timeout: "20s"

jobs:
  num_pollers: 10
  pipeline_size: 100000
  pool:
    num_workers: 2
    max_jobs: 0
    allocate_timeout: 60s
    destroy_timeout: 60s

  pipelines:
    test-1:
      driver: memory
      config:
        priority: 10
        prefetch: 10000
    test-2:
      driver: memory
      config:
        priority: 10
        prefetch: 10000

  consume: ["test-1", "test-2"]

otel:
  resource:
    service_name: "rr-e2e-jobs-otel"
    service_version: "1.0.0"
  insecure: true
  exporter: stdout
